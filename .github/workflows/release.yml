name: Release

# ── 仅在推送 tag（如 v1.0.0）时触发 ──────────────────────────────────────
on:
  push:
    tags:
      - 'v*'           # v1.0.0 / v2.3.1 等
  workflow_dispatch:    # 手动触发（方便调试）

jobs:
  build:
    name: Build & Release
    runs-on: macos-15   # macOS 15 + Xcode 16 (Swift 5.9+ 兼容)
    permissions:
      contents: write   # 创建 Release / 上传 asset

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── 提取版本号 ──────────────────────────────────────────────
      - name: Parse tag
        id: tag
        run: |
          REF="$GITHUB_REF"
          REF="$REF"   # 让 shell 展开，避免后续 # 匹配问题
          if [[ "$REF" == refs/tags/v* ]]; then
            # Tag push: refs/tags/v1.0.0 → full=v1.0.0  version=1.0.0
            FULL="${REF#refs/tags/}"
            VERSION="${FULL#v}"
          else
            # workflow_dispatch 或非 tag — 使用 commit SHA 兜底
            FULL="dev-${GITHUB_SHA::7}"
            VERSION="0.0.0-${GITHUB_SHA::7}"
            echo "::warning::Not a tag push (REF=$REF), using dev version $VERSION"
          fi
          echo "full=$FULL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $FULL  Version: $VERSION"

      # ── Swift build (release) ────────────────────────────────────
      - name: Build release binary
        run: swift build -c release

      # ── 打包 .app bundle ─────────────────────────────────────────
      - name: Create .app bundle & DMG
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          DMG: 1
          # 不签名/不公证 — GitHub Actions 无 Developer ID，本地用 SIGN=1
          SIGN: 0
          NOTARIZE: 0
        run: ./scripts/build-release.sh

      # ── 创建 zip（方便用户下载） ─────────────────────────────────
      - name: Archive .app
        run: |
          cd .build
          VERSION="${{ steps.tag.outputs.version }}"
          zip -r "TokenLens-${VERSION}.zip" TokenLens.app

      # ── 提取 CHANGELOG.md 中对应版本的段落 ─────────────────────
      - name: Prepare release notes
        id: notes
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              /^## \[/ {
                if (found) exit
                gsub(/^## \[/, "")
                gsub(/\] - .*/, "")
                if ($0 == ver) { found=1 }
              }
              found { print }
            ' CHANGELOG.md > .build/release-notes.md
          fi

          if [ -s .build/release-notes.md ]; then
            echo "HAS_CHANGELOG=true" >> "$GITHUB_OUTPUT"
            echo "✅ Using CHANGELOG.md section for v$VERSION"
            cat .build/release-notes.md
          else
            echo "HAS_CHANGELOG=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  No CHANGELOG.md section for v$VERSION, will use auto-generated notes"
          fi

      # ── 上传到 GitHub Release（有 CHANGELOG） ─────────────────
      - name: Create GitHub Release (from CHANGELOG)
        if: steps.notes.outputs.HAS_CHANGELOG == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.full }}
          name: "TokenLens ${{ steps.tag.outputs.full }}"
          body_path: .build/release-notes.md
          files: |
            .build/TokenLens-${{ steps.tag.outputs.version }}.zip
            .build/TokenLens-${{ steps.tag.outputs.version }}.dmg
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.full, '-') }}
          generate_release_notes: false

      # ── 上传到 GitHub Release（自动生成 release notes） ──────
      - name: Create GitHub Release (auto-generated)
        if: steps.notes.outputs.HAS_CHANGELOG != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.full }}
          name: "TokenLens ${{ steps.tag.outputs.full }}"
          files: |
            .build/TokenLens-${{ steps.tag.outputs.version }}.zip
            .build/TokenLens-${{ steps.tag.outputs.version }}.dmg
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.full, '-') }}
          generate_release_notes: true
